# Local hooks so the checks are exactly the ones CI runs (no version skew).
# Install with: uv run pre-commit install --hook-type pre-commit --hook-type pre-push
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        types: [python]
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types: [python]
      - id: code-review
        name: function-level code review (tools/code_review.py)
        entry: uv run python tools/code_review.py
        language: system
        pass_filenames: false
        files: ^(src|tools)/.*\.py$
      - id: unit-tests
        name: unit tests
        entry: env PYTHONPATH= uv run pytest -m "not integration" -q
        language: system
        pass_filenames: false
        stages: [pre-push]
